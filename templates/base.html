{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inventarios</title>
    <!-- CARGAR CSS PRINCIPAL AQUÍ EN HEAD -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}?v=5">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="{% static 'js/dashboard.js' %}?v=3"></script>
</head>
<body>
    <!-- Franja azul superior con logo -->
    <div class="header-strip">
        <div class="header-content">
            <img src="{% static 'images/logo-marathon.png' %}" alt="Logo Marathon" class="login-logo">
        </div>
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Scripts específicos por página -->
    {% block extra_js %}
    {% endblock %}
</body>
</html>
